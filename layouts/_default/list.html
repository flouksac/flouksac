{{ define "main" }}
<section class="page-hero shell compact">
  <p class="overline">{{ .Section | default .Kind }}</p>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ else }}{{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}{{ end }}
</section>

<section class="shell article-list page-list">
  {{ range .Paginator.Pages }}
    {{ partial "list-card.html" . }}
  {{ end }}
</section>

{{ partial "pagination.html" . }}
{{ end }}
