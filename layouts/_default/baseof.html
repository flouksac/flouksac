<!doctype html>
<html lang="{{ site.Language.LanguageCode | default "en" }}" data-theme="dark">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="kind-{{ .Kind }} section-{{ .Section | default "home" }}">
    <canvas class="matrix-canvas" id="matrixCanvas" aria-hidden="true"></canvas>
    <div class="site-noise" aria-hidden="true"></div>
    <div class="site-scanlines" aria-hidden="true"></div>
    <a class="skip-link" href="#main">Skip to content</a>
    {{ partial "header.html" . }}
    <main id="main" class="site-main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ partial "scripts.html" . }}
  </body>
</html>
